name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check_tag.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  ci:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check

      - name: Clippy
        run: cargo clippy -- -D warnings

  create-tag:
    needs: [check-version, ci]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          git tag "${{ needs.check-version.outputs.tag }}"
          git push origin "${{ needs.check-version.outputs.tag }}"

  build:
    name: Build — ${{ matrix.target }}
    needs: [check-version, create-tag]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-latest
            asset: elisym-mcp-darwin-x64
          - target: aarch64-apple-darwin
            runner: macos-latest
            asset: elisym-mcp-darwin-arm64
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            asset: elisym-mcp-linux-x64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            asset: elisym-mcp-linux-arm64
            cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux' && !matrix.cross
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Install OpenSSL (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openssl@3
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --features transport-http
          else
            cargo build --release --target ${{ matrix.target }} --features transport-http
          fi

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/elisym-mcp dist/elisym-mcp
          cd dist
          tar czf ../${{ matrix.asset }}.tar.gz elisym-mcp
          cd ..
          shasum -a 256 ${{ matrix.asset }}.tar.gz > ${{ matrix.asset }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}.tar.gz
            ${{ matrix.asset }}.tar.gz.sha256

  release:
    name: GitHub Release
    needs: [check-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256

  docker:
    name: Docker image
    needs: [check-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux x64 binary
        uses: actions/download-artifact@v4
        with:
          name: elisym-mcp-linux-x64
          path: artifacts

      - name: Download Linux arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: elisym-mcp-linux-arm64
          path: artifacts

      - name: Extract binaries
        run: |
          mkdir -p binaries/linux/amd64 binaries/linux/arm64
          tar xzf artifacts/elisym-mcp-linux-x64.tar.gz -C binaries/linux/amd64
          tar xzf artifacts/elisym-mcp-linux-arm64.tar.gz -C binaries/linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: peregudov/elisym-mcp
          tags: |
            type=raw,value=${{ needs.check-version.outputs.version }}
            type=raw,value=latest

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  crates:
    name: Publish to crates.io
    needs: [check-version, create-tag]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Publish to crates.io
        run: cargo publish --allow-dirty --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  npm:
    name: Publish npm packages
    needs: [check-version, build, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          platforms=("darwin-arm64" "darwin-x64" "linux-x64" "linux-arm64")
          os_map=("darwin" "darwin" "linux" "linux")
          cpu_map=("arm64" "x64" "x64" "arm64")

          for i in "${!platforms[@]}"; do
            plat="${platforms[$i]}"
            pkg_name="@elisym/elisym-mcp-${plat}"
            pkg_dir="npm-staging/${plat}"

            mkdir -p "$pkg_dir"
            tar xzf "artifacts/elisym-mcp-${plat}.tar.gz" -C "$pkg_dir"
            chmod +x "$pkg_dir/elisym-mcp"

            cat > "$pkg_dir/package.json" <<PKGJSON
          {
            "name": "${pkg_name}",
            "version": "${VERSION}",
            "description": "elisym-mcp binary for ${plat}",
            "license": "MIT",
            "repository": {
              "type": "git",
              "url": "https://github.com/elisymlabs/elisym-mcp"
            },
            "os": ["${os_map[$i]}"],
            "cpu": ["${cpu_map[$i]}"],
            "files": ["elisym-mcp"]
          }
          PKGJSON

            cd "$pkg_dir"
            npm publish --access public || echo "Skipped ${pkg_name} (may already exist)"
            cd ../..
          done

      - name: Sync version to server.json and npm/package.json
        run: bash scripts/sync-version.sh

      - name: Publish wrapper package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm
          npm publish --access public || echo "Skipped wrapper (may already exist)"

  mcp-registry:
    name: Publish to MCP Registry
    needs: [check-version, npm]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync version to server.json
        run: bash scripts/sync-version.sh

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz
          sudo mv mcp-publisher /usr/local/bin/

      - name: Authenticate with MCP Registry (OIDC)
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: mcp-publisher publish
